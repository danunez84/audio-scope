<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Audio Insight</title>

  <!-- Bootstrap 5 CSS -->
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
  />

  <!-- Bootstrap Icons -->
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
  />

  <!-- Custom styles -->
  <link rel="stylesheet" href="sidepanel.css" />
</head>
<body>
  <div class="app-container">

    <!-- Header -->
    <header class="app-header">
      <div class="d-flex align-items-center gap-2">
        <i class="bi bi-mic icon-logo"></i>
        <span class="app-title">Audio Insight</span>
      </div>
      <p class="app-subtitle mb-0">Transcribe, search, and explore audio</p>
    </header>

    <!-- Main Content -->
    <main class="app-body">

      <!-- URL Input Section -->
      <section class="mb-4">
        <label for="urlInput" class="form-label label-muted">
          Paste a URL to analyze
        </label>
        <div class="input-group">
          <input
            type="url"
            id="urlInput"
            class="form-control"
            placeholder="https://youtube.com/watch?v=..."
          />
        </div>

        <button id="analyzeBtn" class="btn btn-analyze w-100 mt-3">
          <i class="bi bi-waveform me-2"></i>
          Analyze audio
        </button>

        <button id="currentTabBtn" class="btn btn-outline-secondary w-100 mt-2">
          <i class="bi bi-box-arrow-in-down me-2"></i>
          Use current tab URL
        </button>
      </section>

      <!-- Supported Sources -->
      <section class="sources-section">
        <p class="label-muted mb-2">Supported sources</p>
        <div class="d-flex gap-2 flex-wrap">
          <span class="badge badge-supported">YouTube</span>
          <span class="badge badge-default">Direct audio URL</span>
        </div>
      </section>

    </main>

    <!-- Footer Info -->
    <footer class="app-footer">
      <div class="info-box">
        <p class="mb-0">
          Paste a YouTube link or audio URL and get topic-segmented
          transcripts, summaries, and semantic search — all with timestamps.
        </p>
      </div>
    </footer>

  </div>

  <!-- Bootstrap 5 JS Bundle -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <!-- Custom scripts -->
  <script src="sidepanel.js"></script>
</body>
</html>
